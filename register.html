<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up - ShopPro</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-box-header">
        <h1>Create Account</h1>
        <p>Join ShopPro for exclusive deals and faster checkout</p>
      </div>
      <div class="auth-box-body">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="First name" />
            <div class="error" id="errFname">Required.</div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Last name" />
            <div class="error" id="errLname">Required.</div>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
          <div class="error" id="errEmail">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="phone" placeholder="Enter 10-digit mobile number" />
          <div class="error" id="errPhone">Please enter a valid 10-digit number.</div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" />
          <div class="error" id="errPassword">Password must be at least 6 characters.</div>
        </div>
        <div class="error" id="errGeneral" style="margin-bottom:12px; color:var(--red);"></div>
        <button class="btn btn-primary btn-lg" onclick="doRegister()">Continue</button>
        <div class="auth-link">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script>
    function doRegister() {
      const fname = document.getElementById('fname').value.trim();
      const lname = document.getElementById('lname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      ['errFname','errLname','errEmail','errPhone','errPassword','errGeneral'].forEach(id => {
        document.getElementById(id).classList.remove('show');
        if (id === 'errGeneral') document.getElementById(id).textContent = '';
      });

      if (!fname) { document.getElementById('errFname').classList.add('show'); valid = false; }
      if (!lname) { document.getElementById('errLname').classList.add('show'); valid = false; }
      if (!email || !email.includes('@')) { document.getElementById('errEmail').classList.add('show'); valid = false; }
      if (!phone || !/^\d{10}$/.test(phone.replace(/\D/g,''))) { document.getElementById('errPhone').classList.add('show'); valid = false; }
      if (!password || password.length < 6) { document.getElementById('errPassword').classList.add('show'); valid = false; }
      if (!valid) return;

      const res = registerUser(fname + ' ' + lname, email, phone.replace(/\D/g,''), password);
      if (res.ok) {
        showToast('Account created!', 'success');
        if (!handleRedirectAfterLogin()) window.location.href = 'index.html';
      } else {
        document.getElementById('errGeneral').textContent = res.error;
      }
    }

    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
