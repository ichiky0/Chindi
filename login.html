<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - ShopPro</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-box-header">
        <h1>Login</h1>
        <p>Get access to your orders, wishlist and recommendations</p>
      </div>
      <div class="auth-box-body">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
          <div class="error" id="errEmail">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
          <div class="error" id="errPassword">Password must be at least 6 characters.</div>
        </div>
        <div class="error" id="errGeneral" style="margin-bottom:12px; color:var(--red);"></div>
        <button class="btn btn-primary btn-lg" onclick="doLogin()">Login</button>
        <div class="auth-link">
          New to ShopPro? <a href="register.html">Create an account</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script>
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('errEmail').classList.remove('show');
      document.getElementById('errPassword').classList.remove('show');
      document.getElementById('errGeneral').textContent = '';

      if (!email || !email.includes('@')) { document.getElementById('errEmail').classList.add('show'); valid = false; }
      if (!password || password.length < 6) { document.getElementById('errPassword').classList.add('show'); valid = false; }
      if (!valid) return;

      const res = loginUser(email, password);
      if (res.ok) {
        showToast('Welcome back!', 'success');
        if (!handleRedirectAfterLogin()) window.location.href = 'index.html';
      } else {
        document.getElementById('errGeneral').textContent = res.error;
      }
    }

    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
