<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - ShopPro</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-box-header">
        <h1>Login</h1>
        <p>Get access to your orders, wishlist and recommendations</p>
      </div>
      <div class="auth-box-body">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
          <div class="error" id="errEmail">Please enter a valid email.</div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
          <div class="error" id="errPassword">Password must be at least 6 characters.</div>
        </div>
        <div class="error" id="errGeneral" style="margin-bottom:12px; color:var(--red);"></div>
        <button class="btn btn-primary btn-lg" id="loginBtn">Login</button>
        <div class="auth-link">
          New to ShopPro? <a href="register.html">Create an account</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script type="module" src="js/auth.js"></script>
 </body>
</html>
