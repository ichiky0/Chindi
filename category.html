<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Category - ShopPro</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="top-nav" id="navbar"></nav>
  <div class="sub-nav" id="subnav"></div>

  <div class="container">
    <div class="page-title" id="catTitle">Category</div>
    <div class="cart-layout">
      <div class="filter-sidebar" id="filterSidebar"></div>
      <div style="flex:1;">
        <div class="sort-bar">
          <span class="results" id="resultsCount"></span>
          <div>
            <span style="font-size:13px; color:var(--text-3); margin-right:8px;">Sort by:</span>
            <select id="sortSelect" onchange="renderCategory()">
              <option value="relevance">Relevance</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Rating</option>
            </select>
          </div>
        </div>
        <div class="product-grid" id="catGrid"></div>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script>
    const cParams = new URLSearchParams(window.location.search);
    const catId = cParams.get('cat') || 'electronics';
    const catInfo = CATEGORIES.find(c => c.id === catId) || CATEGORIES[0];
    let selectedSubcats = new Set();
    let selectedBrands = new Set();
    let minPrice = 0, maxPrice = 2000;

    document.getElementById('catTitle').textContent = catInfo.name;

    function renderFilters() {
      const brands = [...new Set(PRODUCTS.filter(p => p.category.toLowerCase() === catId).map(p => p.brand))].sort();
      document.getElementById('filterSidebar').innerHTML = `
        <h4>Filters</h4>
        <div class="filter-group">
          <h5>Subcategories</h5>
          ${catInfo.subcats.map(s => `
            <label class="filter-option">
              <input type="checkbox" value="${s}" onchange="toggleSubcat(this)" ${selectedSubcats.has(s) ? 'checked' : ''} /> ${s}
            </label>
          `).join('')}
        </div>
        <div class="filter-group">
          <h5>Brand</h5>
          ${brands.map(b => `
            <label class="filter-option">
              <input type="checkbox" value="${b}" onchange="toggleBrand(this)" ${selectedBrands.has(b) ? 'checked' : ''} /> ${b}
            </label>
          `).join('')}
        </div>
        <div class="filter-group">
          <h5>Price</h5>
          <div class="form-group">
            <label>Min: $<span id="minVal">${minPrice}</span></label>
            <input type="range" min="0" max="2000" step="50" value="${minPrice}" oninput="minPrice=parseInt(this.value); document.getElementById('minVal').textContent=minPrice; renderCategory();" style="width:100%;" />
          </div>
          <div class="form-group">
            <label>Max: $<span id="maxVal">${maxPrice}</span></label>
            <input type="range" min="0" max="2000" step="50" value="${maxPrice}" oninput="maxPrice=parseInt(this.value); document.getElementById('maxVal').textContent=maxPrice; renderCategory();" style="width:100%;" />
          </div>
        </div>
      `;
    }

    function toggleSubcat(el) {
      if (el.checked) selectedSubcats.add(el.value);
      else selectedSubcats.delete(el.value);
      renderCategory();
    }

    function toggleBrand(el) {
      if (el.checked) selectedBrands.add(el.value);
      else selectedBrands.delete(el.value);
      renderCategory();
    }

    function renderCategory() {
      let products = PRODUCTS.filter(p => p.category.toLowerCase() === catId);

      if (selectedSubcats.size) products = products.filter(p => selectedSubcats.has(p.subcategory));
      if (selectedBrands.size) products = products.filter(p => selectedBrands.has(p.brand));
      products = products.filter(p => p.price >= minPrice && p.price <= maxPrice);

      const sort = document.getElementById('sortSelect').value;
      if (sort === 'price-asc') products.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);
      if (sort === 'rating') products.sort((a, b) => b.rating - a.rating);

      document.getElementById('resultsCount').textContent = `${products.length} result${products.length !== 1 ? 's' : ''} in ${catInfo.name}`;

      const grid = document.getElementById('catGrid');
      if (!products.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="icon">&#128269;</div>
            <h3>No products match your filters</h3>
            <p>Try adjusting the filters.</p>
          </div>
        `;
        return;
      }
      grid.innerHTML = products.map(renderProductCard).join('');
    }

    renderFilters();
    renderCategory();
  </script>
</body>
</html>
