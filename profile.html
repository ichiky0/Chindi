<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile - ShopPro</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="top-nav" id="navbar"></nav>
  <div class="sub-nav" id="subnav"></div>

  <div class="container">
    <div class="page-title">My Account</div>
    <div class="profile-layout">
      <div class="profile-sidebar" id="profileSidebar"></div>
      <div class="profile-content" id="profileContent"></div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script>
    if (!isLoggedIn()) { requireLogin('profile.html'); }

    const user = getCurrentUser();

    document.getElementById('profileSidebar').innerHTML = `
      <div class="profile-card">
        <div class="avatar">${user.name.charAt(0).toUpperCase()}</div>
        <h3>Hello, ${user.name}</h3>
        <p>${user.email}</p>
      </div>
      <div class="profile-menu">
        <a href="profile.html" class="active">Profile Information</a>
        <a href="orders.html">My Orders</a>
        <a href="wishlist.html">My Wishlist</a>
        <a href="cart.html">My Cart</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
      </div>
    `;

    document.getElementById('profileContent').innerHTML = `
      <div class="card">
        <h3>Personal Information</h3>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" id="pName" value="${user.name}" /></div>
          <div class="form-group"><label>Email</label><input type="email" id="pEmail" value="${user.email}" disabled style="background:var(--gray-1);" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" id="pPhone" value="${user.phone || ''}" /></div>
          <div class="form-group"><label>Gender</label>
            <select id="pGender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save Changes</button>
      </div>

      <div class="card">
        <h3>Manage Addresses</h3>
        <div id="addressList"></div>
        <div class="mt-3" id="addAddrForm" style="display:none;">
          <div class="form-row">
            <div class="form-group"><label>Name</label><input type="text" id="naName" /></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="naPhone" /></div>
          </div>
          <div class="form-group"><label>Address Line 1</label><input type="text" id="naLine1" /></div>
          <div class="form-group"><label>Address Line 2</label><input type="text" id="naLine2" /></div>
          <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" id="naCity" /></div>
            <div class="form-group"><label>State</label><input type="text" id="naState" /></div>
            <div class="form-group"><label>PIN</label><input type="text" id="naPin" /></div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="saveNewAddress()">Save Address</button>
        </div>
        <button class="btn btn-outline btn-sm mt-3" onclick="document.getElementById('addAddrForm').style.display='block'; this.style.display='none';">+ Add New Address</button>
      </div>
    `;

    function renderAddresses() {
      const list = getAddresses();
      document.getElementById('addressList').innerHTML = list.length ? list.map(a => `
        <div class="info-row" style="align-items:flex-start; flex-direction:column; gap:4px;">
          <div style="display:flex; justify-content:space-between; width:100%;">
            <span class="value">${a.name}${a.isDefault ? ' <span style="background:var(--green);color:white;padding:2px 6px;border-radius:3px;font-size:10px;">Default</span>' : ''}</span>
            <a href="#" style="color:var(--red); font-size:12px; font-weight:600;" onclick="deleteAddress(${a.id}); return false;">Remove</a>
          </div>
          <span class="label">${a.line1}${a.line2 ? ', ' + a.line2 : ''}, ${a.city}, ${a.state} - ${a.pin}<br>Phone: ${a.phone}</span>
        </div>
      `).join('') : '<p style="color:var(--text-3); font-size:13px;">No saved addresses.</p>';
    }
    renderAddresses();

    function saveProfile() {
      const name = document.getElementById('pName').value.trim();
      const phone = document.getElementById('pPhone').value.trim();
      if (!name) { showToast('Name is required', 'error'); return; }
      updateUserProfile({ name, phone });
      showToast('Profile updated', 'success');
      location.reload();
    }

    function saveNewAddress() {
      const name = document.getElementById('naName').value.trim();
      const phone = document.getElementById('naPhone').value.trim();
      const line1 = document.getElementById('naLine1').value.trim();
      const line2 = document.getElementById('naLine2').value.trim();
      const city = document.getElementById('naCity').value.trim();
      const state = document.getElementById('naState').value.trim();
      const pin = document.getElementById('naPin').value.trim();
      if (!name || !phone || !line1 || !city || !state || !pin) { showToast('Please fill all required fields', 'error'); return; }
      const all = getAddresses();
      all.push({ id: Date.now(), name, phone, line1, line2, city, state, pin, isDefault: all.length === 0 });
      saveAddresses(all);
      showToast('Address saved', 'success');
      renderAddresses();
      document.getElementById('addAddrForm').style.display = 'none';
      document.querySelector('.btn-outline').style.display = 'inline-flex';
    }

    function deleteAddress(id) {
      if (!confirm('Delete this address?')) return;
      saveAddresses(getAddresses().filter(a => a.id !== id));
      showToast('Address removed', 'success');
      renderAddresses();
    }
  </script>
</body>
</html>
